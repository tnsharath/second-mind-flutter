name: aura
description: AURA — a persistent AI companion. Phase 1 mobile client (Flutter).
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management & navigation
  flutter_riverpod: ^2.6.1
  hooks_riverpod: ^2.6.1
  flutter_hooks: ^0.20.5
  go_router: ^14.6.2

  # Networking
  dio: ^5.7.0
  web_socket_channel: ^3.0.1

  # Models / code generation
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UI / UX
  responsive_framework: ^1.5.1
  google_fonts: ^6.2.1
  flutter_markdown: ^0.7.4
  shimmer: ^3.0.0

  # Device capabilities
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.2
  flutter_local_notifications: ^18.0.1
  flutter_secure_storage: ^9.2.2
  google_sign_in: ^6.2.2
  shared_preferences: ^2.3.3
  connectivity_plus: ^6.1.1

  # Utils
  intl: any # pinned by flutter_localizations; keep unconstrained
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  freezed: ^2.5.8
  json_serializable: ^6.9.0
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

# Run `dart run flutter_launcher_icons` after `flutter create` generates
# the platform scaffolding (done automatically in CI).
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon.png
  adaptive_icon_background: "#0D1117"
  adaptive_icon_foreground: assets/icon/adaptive_fg.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/
