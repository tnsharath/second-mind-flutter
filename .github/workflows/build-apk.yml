name: Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      api_base_url:
        description: Backend API base URL (baked in via --dart-define)
        required: false
        default: https://second-mind-backend.vercel.app
      use_mock_api:
        description: Use mock repositories instead of the real backend (true/false)
        required: false
        default: 'false'

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate Android platform scaffolding
        run: flutter create --platforms android --project-name aura --org com.aura .

      - name: Patch AndroidManifest (permissions + queries)
        run: python3 tool/patch_android_manifest.py

      - name: Patch Android build.gradle (desugaring)
        run: python3 tool/patch_android_build_gradle.py

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (freezed / json_serializable)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Static analysis (informational)
        run: flutter analyze || true

      - name: Build release APK (split per ABI)
        run: |
          flutter build apk --release --split-per-abi \
            --dart-define=API_BASE_URL=${{ github.event.inputs.api_base_url || 'https://second-mind-backend.vercel.app' }} \
            --dart-define=USE_MOCK_API=${{ github.event.inputs.use_mock_api || 'false' }}

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aura-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 14
